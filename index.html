<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrenoScommesse</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');

:root{
  --bg:#0e1117;
  --navy:#0c1a2e;
  --navy2:#132238;
  --panel:#131c2e;
  --panel2:#1a2540;
  --gold:#f0b429;
  --gold2:#e8a000;
  --red:#e03040;
  --blue:#2979ff;
  --teal:#00bfa5;
  --orange:#ff6d00;
  --green:#00c853;
  --purple:#9c27b0;
  --border:rgba(255,255,255,0.08);
  --text:#f0f4ff;
  --muted:#6b7fa3;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg:0 16px 56px rgba(0,0,0,0.6);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Barlow',sans-serif;
  background:linear-gradient(180deg,#0a0f18,#0e1117);
  color:var(--text);
  overflow-x:hidden;
  min-height:100vh;
  font-size:15px;
}

.topbar{
  position:sticky;
  top:0;
  z-index:200;
  background:rgba(12,26,46,0.92);
  backdrop-filter:blur(18px);
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid var(--border);
}

.brand{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  font-weight:900;
  letter-spacing:.02em;
  color:var(--text);
}

.brand span{color:var(--gold);}

.top-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.map-toggle-btn{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  color:var(--text);
  padding:7px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:.04em;
  font-family:'Barlow Condensed',sans-serif;
}

.map-toggle-btn:active{transform:scale(.96);}

.map-toggle-btn.active{
  background:var(--teal);
  border-color:var(--teal);
  color:#00140f;
}

.balance-pill{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#111;
  padding:8px 14px;
  border-radius:16px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;
  font-weight:800;
  box-shadow:0 4px 16px rgba(240,180,41,0.28);
}

.balance-pill.bump{animation:bump .3s ease;}

@keyframes bump{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.12)}
}

.container{
  max-width:560px;
  margin:0 auto;
  padding:16px 14px 100px;
}

.page{display:none;}
.page.active{display:block;}

.sec-hd{margin-bottom:16px;}

.sec-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;
  font-weight:900;
  letter-spacing:.02em;
  margin-bottom:3px;
}

.sec-sub{
  font-size:13px;
  color:var(--muted);
}

.iso-wrap{
  position:relative;
  background:
    radial-gradient(circle at 20% 18%, rgba(41,121,255,0.10), transparent 28%),
    radial-gradient(circle at 82% 28%, rgba(0,191,165,0.08), transparent 24%),
    linear-gradient(160deg,#091321 0%, #0d1d34 46%, #0a1628 100%);
  border-radius:24px;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,0.06);
  aspect-ratio:1/0.75;
}

.iso-wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:28px 28px;
  opacity:.28;
  pointer-events:none;
}

.iso-wrap::after{
  content:"";
  position:absolute;
  inset:auto 0 0 0;
  height:34%;
  background:linear-gradient(to top, rgba(0,0,0,0.24), transparent);
  pointer-events:none;
}

#isoCanvas{
  display:block;
  width:100%;
  height:100%;
  cursor:pointer;
  position:relative;
  z-index:2;
}

.map-hint{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  margin-bottom:20px;
  letter-spacing:.03em;
  opacity:.92;
}

.territory-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:16px;
}

.ts-card{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  text-align:center;
  box-shadow:var(--shadow);
}

.ts-icon{
  font-size:20px;
  margin-bottom:4px;
}

.ts-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  font-weight:800;
  color:var(--gold);
}

.ts-lbl{
  font-size:11px;
  color:var(--muted);
  font-weight:600;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.italy-wrap{
  position:relative;
  background:
    radial-gradient(circle at 18% 14%, rgba(41,121,255,0.10), transparent 24%),
    radial-gradient(circle at 78% 76%, rgba(0,191,165,0.08), transparent 28%),
    linear-gradient(160deg,#071220 0%, #0d1b31 48%, #091423 100%);
  border-radius:24px;
  overflow:hidden;
  margin-bottom:16px;
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,0.06);
  aspect-ratio:1/1.2;
}

.italy-wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:30px 30px;
  opacity:.24;
  pointer-events:none;
}

#italyCanvas{
  display:block;
  width:100%;
  height:100%;
  cursor:pointer;
  position:relative;
  z-index:2;
}

.bet-list{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:20px;
}

.bet-card{
  background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.00)), var(--panel2);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  position:relative;
  box-shadow:var(--shadow);
}

.bet-card:active{transform:scale(.985);}

.bet-card-inner{
  display:flex;
  align-items:stretch;
  gap:0;
  min-height:112px;
}

.train-visual{
  width:158px;
  flex-shrink:0;
  min-height:112px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  border-right:1px solid rgba(255,255,255,0.05);
}

.train-visual::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.04), transparent 40%, rgba(0,0,0,0.16));
  pointer-events:none;
}

.train-visual svg{
  width:142px;
  height:68px;
  position:relative;
  z-index:2;
}

.bet-info{
  flex:1;
  padding:14px 14px 14px 10px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.bet-badge{
  display:inline-block;
  padding:4px 9px;
  border-radius:8px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:8px;
  width:fit-content;
  font-family:'Barlow Condensed',sans-serif;
}

.bet-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  font-weight:800;
  margin-bottom:2px;
  line-height:1;
  letter-spacing:.01em;
}

.bet-route{
  font-size:12px;
  color:var(--muted);
  font-weight:500;
}

.bet-chip{
  position:absolute;
  top:10px;
  right:10px;
  padding:4px 10px;
  border-radius:10px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.04em;
  font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;
}

.chip-red{
  background:rgba(224,48,64,0.18);
  color:#ff7d8a;
  border:1px solid rgba(224,48,64,0.28);
}
.chip-yellow{
  background:rgba(240,180,41,0.16);
  color:#f0c254;
  border:1px solid rgba(240,180,41,0.24);
}
.chip-green{
  background:rgba(0,200,83,0.16);
  color:#54e08f;
  border:1px solid rgba(0,200,83,0.24);
}

.bet-av .train-visual{background:linear-gradient(90deg,#17040d,#32101b,#17040d);}
.bet-ic .train-visual{background:linear-gradient(90deg,#081223,#102746,#081223);}
.bet-re .train-visual{background:linear-gradient(90deg,#07170f,#103323,#07170f);}
.bet-il .train-visual{background:linear-gradient(90deg,#1a1005,#3b2109,#1a1005);}

.bet-av .bet-badge{background:rgba(224,48,64,0.14);color:#ff7d8a;}
.bet-ic .bet-badge{background:rgba(41,121,255,0.14);color:#8bbcff;}
.bet-re .bet-badge{background:rgba(0,200,83,0.14);color:#69f0ae;}
.bet-il .bet-badge{background:rgba(255,109,0,0.14);color:#ffb266;}

.dep-board{
  background:#060e1a;
  border:1px solid rgba(0,191,165,0.12);
  border-radius:16px;
  padding:14px;
  font-family:'Barlow Condensed',sans-serif;
  margin-bottom:16px;
  box-shadow:0 0 24px rgba(0,191,165,0.04);
}

.dep-hd{
  display:grid;
  grid-template-columns:1.2fr 1.4fr .7fr .8fr;
  gap:8px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  color:var(--teal);
  text-transform:uppercase;
  padding-bottom:10px;
  border-bottom:1px solid rgba(0,191,165,0.1);
  margin-bottom:8px;
}

.dep-row{
  display:grid;
  grid-template-columns:1.2fr 1.4fr .7fr .8fr;
  gap:8px;
  font-size:14px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  align-items:center;
}

.dep-row:last-child{border:none;}
.s-ok{color:#69f0ae}
.s-mid{color:#f0b429}
.s-bad{color:#ff6b7a}

.collection-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

.coll-card{
  background:linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0.00)), var(--panel2);
  border:2px solid var(--border);
  border-radius:18px;
  padding:12px 8px;
  text-align:center;
  cursor:pointer;
  transition:transform .15s, border-color .2s, box-shadow .2s;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.coll-card:active{transform:scale(.95);}
.coll-card.locked{opacity:.45;filter:grayscale(.8);}
.coll-card.owned{border-color:rgba(240,180,41,0.45);}
.coll-card.active-train{
  border-color:var(--teal);
  box-shadow:0 0 20px rgba(0,191,165,0.22);
}

.card-rarity{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  border-radius:18px 18px 0 0;
}

.rarity-common{background:#607d8b;}
.rarity-rare{background:#2979ff;}
.rarity-epic{background:#9c27b0;}
.rarity-legendary{background:linear-gradient(90deg,#f0b429,#ff6d00,#f0b429);}

.card-train-art{
  width:80px;
  height:44px;
  margin:8px auto 6px;
}

.card-train-art svg{
  width:80px;
  height:44px;
}

.card-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;
  font-weight:800;
  margin-bottom:2px;
  line-height:1.1;
}

.card-driver{
  font-size:10px;
  color:var(--muted);
}

.card-stats{
  display:flex;
  justify-content:space-around;
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid var(--border);
}

.card-stat{text-align:center;}

.cs-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;
  font-weight:800;
  color:var(--gold);
}

.cs-lbl{
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.05em;
}

.card-lock-icon{
  font-size:24px;
  margin:10px 0;
}

.card-cost{
  font-size:11px;
  color:var(--gold);
  font-weight:700;
}

.active-badge{
  position:absolute;
  bottom:4px;
  right:4px;
  background:var(--teal);
  color:#000;
  font-size:8px;
  font-weight:900;
  letter-spacing:.06em;
  padding:2px 5px;
  border-radius:6px;
  text-transform:uppercase;
}
