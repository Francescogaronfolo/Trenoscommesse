<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Simulatore Strategico</title>

<style>
body {
    background: #0a0f1c;
    color: #e0e6ff;
    font-family: Arial;
    text-align: center;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}

/* UI */
.panel {
    margin-top: 20px;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 20%;
    left: 30%;
    width: 40%;
    background: #111;
    border: 2px solid #555;
    padding: 20px;
}

/* Carte */
.card {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
}

/* Operatori (difesa) */
.operator {
    background: #1e2a3a;
    border: 1px solid #4aa3ff;
}

/* Top Secret (attacco) */
.secret {
    background: #2a1a1a;
    border: 1px solid red;
    box-shadow: 0 0 10px red;
}
</style>

</head>
<body>

<h1>Simulatore Strategico</h1>

<div>
    💰 Soldi: <span id="money">1000</span>
</div>

<div class="panel">
    <button onclick="openMarket()">Mercato</button>
    <button onclick="openCards()">Carte</button>
    <button onclick="recruitOperator()">Recluta Operatore</button>
</div>

<!-- POPUP MERCATO -->
<div id="marketPopup" class="popup">
    <h2>Mercato</h2>
    <button onclick="buyStock()">Compra Quote</button>
    <button onclick="auction()">Partecipa Asta</button>
    <br><br>
    <button onclick="closePopup()">Chiudi</button>
</div>

<!-- POPUP CARTE -->
<div id="cardsPopup" class="popup">
    <h2>Famiglie Carte</h2>

    <div id="cardsContainer"></div>

    <button onclick="closePopup()">Chiudi</button>
</div>

<!-- NOTIZIE -->
<div class="panel">
    📰 <span id="news">Nessuna notizia</span>
</div>

<script>
let money = 1000;
let income = 5; // €/secondo realistico
let security = 1;
let operators = 0;

/* AGGIORNAMENTO SOLDI */
setInterval(() => {
    money += income;
    updateUI();
}, 1000);

/* UI */
function updateUI() {
    document.getElementById("money").innerText = Math.floor(money);
}

/* POPUP */
function openMarket() {
    document.getElementById("marketPopup").style.display = "block";
}

function openCards() {
    document.getElementById("cardsPopup").style.display = "block";
    renderCards();
}

function closePopup() {
    document.getElementById("marketPopup").style.display = "none";
    document.getElementById("cardsPopup").style.display = "none";
}

/* MERCATO */
function buyStock() {
    if (money >= 200) {
        money -= 200;
        income += 2;
        news("Hai investito nel mercato 📈");
    }
}

function auction() {
    if (money >= 500) {
        money -= 500;
        income += 5;
        news("Hai vinto un appalto 🏗️");
    }
}

/* OPERATORI (difesa) */
function recruitOperator() {
    let cost = 100 * security;

    if (money >= cost) {
        money -= cost;
        operators++;
        security++;
        news("Nuovo operatore reclutato 🛡️");
    }
}

/* CARTE */
function renderCards() {
    let container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    // Operatori (difesa)
    let op = document.createElement("div");
    op.className = "card operator";
    op.innerText = "Operatori Difesa";
    container.appendChild(op);

    // Top Secret (attacco)
    let secret = document.createElement("div");
    secret.className = "card secret";
    secret.innerText = "Operazioni Top Secret";
    container.appendChild(secret);
}

/* NOTIZIE RANDOM */
function news(text) {
    document.getElementById("news").innerText = text;
}

/* EVENTI RANDOM */
setInterval(() => {
    let events = [
        "Crisi economica ⚠️",
        "Boom finanziario 💰",
        "Nuova legge sugli appalti 📜",
        "Indagine interna 🕵️"
    ];

    let event = events[Math.floor(Math.random() * events.length)];

    document.getElementById("news").innerText = event;

    // Effetti reali
    if (event.includes("Crisi")) income -= 1;
    if (event.includes("Boom")) income += 2;

}, 8000);

</script>

</body>
</html>
