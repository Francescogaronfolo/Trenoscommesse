<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TrenoScommesse</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');

:root{
--bg:#0e1117;
--panel:#131c2e;
--panel2:#1a2540;
--gold:#f0b429;
--gold2:#e8a000;
--blue:#2979ff;
--teal:#00bfa5;
--green:#00c853;
--border:rgba(255,255,255,0.08);
--text:#f0f4ff;
--muted:#6b7fa3;
--shadow:0 8px 32px rgba(0,0,0,0.4);
--shadow-lg:0 16px 56px rgba(0,0,0,0.6);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Barlow',sans-serif;
background:linear-gradient(180deg,#0a0f18,#0e1117);
color:var(--text);
min-height:100vh;
}

/* TOPBAR */
.topbar{
position:sticky;
top:0;
z-index:200;
background:rgba(12,26,46,0.85);
backdrop-filter:blur(18px);
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid var(--border);
}

.brand{
font-family:'Barlow Condensed',sans-serif;
font-size:22px;
font-weight:900;
}

.brand span{color:var(--gold);}

.balance-pill{
background:linear-gradient(135deg,var(--gold2),var(--gold));
color:#111;
padding:8px 14px;
border-radius:14px;
font-weight:800;
box-shadow:0 6px 20px rgba(240,180,41,0.3);
}

/* NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(12,26,46,0.95);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid var(--border);
}

.nav-btn{
display:flex;
flex-direction:column;
align-items:center;
color:#777;
font-size:12px;
}

.nav-btn.active{color:#fff;}

.nav-icon{
width:42px;
height:42px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.05);
}

.nav-btn.active .nav-icon{
background:var(--blue);
}

/* CARD */
.bet-card{
background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.2));
border:1px solid var(--border);
border-radius:20px;
overflow:hidden;
box-shadow:var(--shadow);
margin-bottom:12px;
}

/* POPUP */
.popup{
background:#111a2e;
border-radius:28px 28px 0 0;
padding:20px;
position:fixed;
bottom:0;
left:0;
right:0;
z-index:300;
display:none;
}

.popup.open{display:block;}

.toast{
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
background:#111a2e;
padding:10px 20px;
border-radius:16px;
opacity:0;
transition:.3s;
}

.toast.show{opacity:1;}

</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">Treno<span>Scommesse</span></div>
  <div class="balance-pill" id="balance">1000€</div>
</div>

<!-- CONTENUTO -->
<div style="padding:16px; padding-bottom:100px;">

  <!-- PAGINA STAZIONE -->
  <div id="pageStation">

    <h2 style="margin-bottom:10px;">La tua Stazione</h2>

    <div style="
      height:220px;
      border-radius:20px;
      background:linear-gradient(160deg,#0a1628,#0d2040);
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,0.3);
      font-size:14px;
      border:1px solid var(--border);
      margin-bottom:20px;
    ">
      (Qui dopo mettiamo la stazione 3D migliorata)
    </div>

  </div>

  <!-- PAGINA SCOMMESSE -->
  <div id="pageBets" style="display:none;">

    <h2 style="margin-bottom:10px;">Scommesse</h2>

    <div id="betList">

      <div class="bet-card" onclick="openBet()">
        <div style="padding:14px;">
          <div style="font-weight:800;">Frecciarossa</div>
          <div style="font-size:12px;color:var(--muted);">Roma → Milano</div>
        </div>
      </div>

    </div>

  </div>

  <!-- PAGINA COLLEZIONE -->
  <div id="pageCollection" style="display:none;">
    <h2>Collezione</h2>
    <p style="color:var(--muted);">Qui metteremo le carte treno</p>
  </div>

  <!-- PAGINA PROFILO -->
  <div id="pageProfile" style="display:none;">
    <h2>Profilo</h2>
    <p style="color:var(--muted);">Statistiche giocatore</p>
  </div>

</div>

<!-- NAVBAR -->
<div class="bottom-nav">

  <div class="nav-btn active" onclick="showPage('Station',this)">
    <div class="nav-icon">🏛️</div>
    Stazione
  </div>

  <div class="nav-btn" onclick="showPage('Bets',this)">
    <div class="nav-icon">🎲</div>
    Scommesse
  </div>

  <div class="nav-btn" onclick="showPage('Collection',this)">
    <div class="nav-icon">🃏</div>
    Carte
  </div>

  <div class="nav-btn" onclick="showPage('Profile',this)">
    <div class="nav-icon">👤</div>
    Profilo
  </div>

</div>
