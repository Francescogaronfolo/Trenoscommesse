<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrenoScommesse</title>

<style>

body{
    margin:0;
    font-family:-apple-system;
    background:#f4f1ea;
}

/* TOP */
.topbar{
    background:#133a5c;
    color:white;
    padding:18px;
    display:flex;
    justify-content:space-between;
}

.balance{
    background:#d4a843;
    padding:8px 16px;
    border-radius:12px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    padding:20px;
}

/* CARD TRENI (NUOVO) */
.train-card{
    background:#ddd3c4;
    border-radius:25px;
    margin-bottom:25px;
    padding:20px;
    transition:0.2s;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.train-card:active{
    transform:scale(0.97);
}

/* TRENO VISIVO */
.train-visual{
    height:70px;
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

/* LOCOMOTIVA */
.engine{
    width:90px;
    height:50px;
    background:linear-gradient(135deg,#3a7bd5,#2a5fa0);
    border-radius:12px;
    position:relative;
}

/* MUSO */
.engine::after{
    content:"";
    position:absolute;
    right:-15px;
    top:10px;
    width:25px;
    height:30px;
    background:#2a5fa0;
    border-radius:0 12px 12px 0;
}

/* VAGONI */
.car{
    width:70px;
    height:45px;
    background:#bbb;
    margin-left:8px;
    border-radius:10px;
}

/* COLORI VARI */
.red .engine{background:linear-gradient(135deg,#ff4b4b,#c92a2a);}
.yellow .engine{background:linear-gradient(135deg,#ffc107,#cc9a00);}
.gray .engine{background:linear-gradient(135deg,#888,#555);}

/* INFO */
.train-info h3{
    margin:0;
    font-size:18px;
}

.train-info span{
    color:#555;
    font-size:14px;
}

.badge{
    background:#eee;
    padding:5px 10px;
    border-radius:12px;
    font-size:12px;
    margin-top:5px;
    display:inline-block;
}

/* STATO */
.status{
    margin-top:10px;
    height:10px;
    border-radius:10px;
}

.status.red{background:#ff3b30;}
.status.yellow{background:#ffcc00;}
.status.green{background:#34c759;}

/* QUADRO ORARI */
.schedule{
    background:#111;
    color:#d4a843;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    font-family:monospace;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
}

/* POPUP */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
}

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#f7f3ed;
    padding:20px;
    border-radius:20px;
    width:300px;
    display:none;
}

.bet-options{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.bet-options button{
    flex:1;
    padding:10px;
    border-radius:12px;
}

.bet-options button.active{
    background:#133a5c;
    color:white;
}

.actions{
    display:flex;
    margin-top:15px;
    gap:10px;
}

.confirm{
    background:#133a5c;
    color:white;
}

/* BOTTOM BAR (NUOVA FORTE) */
.bottom-bar{
    position:fixed;
    bottom:0;
    width:100%;
    background:#133a5c;
    padding:20px;
    display:flex;
    justify-content:space-around;
    border-radius:20px 20px 0 0;
}

.icon{
    font-size:26px;
    opacity:0.7;
}

.center-btn{
    background:#d4a843;
    padding:18px;
    border-radius:20px;
    font-size:26px;
    transform:translateY(-20px);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="topbar">
    🚆 TrenoScommesse
    <div class="balance">1000€</div>
</div>

<div class="container">

<!-- TRENI -->

<div class="train-card red" onclick="openPopup()">
    <div class="train-visual">
        <div class="engine"></div>
        <div class="car"></div>
        <div class="car"></div>
    </div>
    <div class="train-info">
        <h3>Atria V-01</h3>
        <span>Roma → Milano</span>
        <div class="badge">Alta Velocità</div>
    </div>
    <div class="status red"></div>
</div>

<div class="train-card yellow" onclick="openPopup()">
    <div class="train-visual">
        <div class="engine"></div>
        <div class="car"></div>
        <div class="car"></div>
    </div>
    <div class="train-info">
        <h3>Radian R-12</h3>
        <span>Venezia → Roma</span>
        <div class="badge">Velocità Lunga</div>
    </div>
    <div class="status yellow"></div>
</div>

<div class="train-card gray" onclick="openPopup()">
    <div class="train-visual">
        <div class="engine"></div>
        <div class="car"></div>
        <div class="car"></div>
    </div>
    <div class="train-info">
        <h3>Intera N-07</h3>
        <span>Napoli → Torino</span>
        <div class="badge">Linea Interurbana</div>
    </div>
    <div class="status red"></div>
</div>

<!-- ORARI -->
<div class="schedule">
    <div class="row"><span>Atria V-01</span><span>08:12 +6</span></div>
    <div class="row"><span>Radian R-12</span><span>09:45 +13</span></div>
    <div class="row"><span>Intera N-07</span><span>10:20 +20</span></div>
</div>

</div>

<!-- POPUP -->
<div class="overlay" onclick="closePopup()"></div>

<div class="popup">
    <h2>Treno</h2>

    Ritardo previsto: <span id="min">15</span> min
    <input type="range" min="1" max="60" value="15" id="slider">

    <div class="bet-options">
        <button onclick="selectBet(this)">50€</button>
        <button onclick="selectBet(this)">100€</button>
        <button onclick="selectBet(this)" class="active">200€</button>
        <button onclick="selectBet(this)">500€</button>
    </div>

    <div class="actions">
        <button onclick="closePopup()">Annulla</button>
        <button class="confirm">Conferma</button>
    </div>
</div>

<!-- BOTTOM -->
<div class="bottom-bar">
    <div class="icon">👤</div>
    <div class="center-btn">🚉</div>
    <div class="icon">🎯</div>
</div>

<script>

let slider=document.getElementById("slider");
let min=document.getElementById("min");

slider.oninput=()=>min.innerText=slider.value;

function openPopup(){
    document.querySelector(".overlay").style.display="block";
    document.querySelector(".popup").style.display="block";
}

function closePopup(){
    document.querySelector(".overlay").style.display="none";
    document.querySelector(".popup").style.display="none";
}

function selectBet(btn){
    document.querySelectorAll(".bet-options button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

</script>

</body>
</html>
