<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#e3dfd3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* MAPPA */
.map{
  width:1200px;
  height:600px;
  background:#f2efe6;
  position:relative;
  border-radius:14px;
  overflow:hidden;
}

/* === LINEE BINARI (EFFETTO PROFONDITÀ) === */
.line{
  position:absolute;
  height:14px;
  background:#2c2c2c;
  border-radius:8px;
}

/* ombra sotto */
.line::after{
  content:"";
  position:absolute;
  top:4px;
  left:4px;
  right:-4px;
  bottom:-4px;
  background:#00000025;
  border-radius:8px;
  z-index:-1;
}

/* linea principale */
.main{
  width:80%;
  top:250px;
  left:10%;
}

/* diramazioni */
.branch{
  height:12px;
}

.vertical{
  width:12px;
}

/* === NODI (EFFETTO MINI MOTORWAYS) === */
.node{
  position:absolute;
  width:90px;
  height:90px;
  border-radius:16px;
  background:#3b3b3b;
}

/* parte interna (layer sopra) */
.node-inner{
  position:absolute;
  inset:8px;
  border-radius:12px;
  background:#f2efe6;
}

/* ombra */
.node::after{
  content:"";
  position:absolute;
  inset:0;
  transform:translate(6px,6px);
  background:#00000020;
  border-radius:16px;
  z-index:-1;
}

/* === STAZIONE (più importante) === */
.station{
  width:100px;
  height:140px;
  top:280px;
  left:42%;
}

.station-inner{
  position:absolute;
  inset:10px;
  border-radius:10px;
  background:#f2efe6;
}

/* porte */
.doors{
  position:absolute;
  inset:10px;
  background:repeating-linear-gradient(
    90deg,
    transparent,
    transparent 6px,
    #2c2c2c 6px,
    #2c2c2c 9px
  );
}

/* === TRENI */
.train{
  position:absolute;
  width:50px;
  height:18px;
  background:#1f1f1f;
  border-radius:6px;
}

.train::after{
  content:"";
  position:absolute;
  inset:0;
  transform:translate(3px,3px);
  background:#00000030;
  border-radius:6px;
  z-index:-1;
}

.t1{ left:14%; top:245px;}
.t2{ left:20%; top:245px;}

/* === BINARI REALISTICI */
.tracks-pattern{
  position:absolute;
  inset:12px;
  background:
    repeating-linear-gradient(
      0deg,
      #2c2c2c,
      #2c2c2c 2px,
      transparent 2px,
      transparent 8px
    );
}

/* === CONTROLLO */
.control-pattern{
  position:absolute;
  inset:15px;
  background:
    linear-gradient(#2c2c2c 0 0) center/60% 4px no-repeat,
    linear-gradient(#2c2c2c 0 0) center/4px 60% no-repeat;
}

/* === MERCI */
.cargo-pattern{
  position:absolute;
  inset:12px;
  background:
    linear-gradient(#2c2c2c 0 0) 10px 10px/20px 12px no-repeat,
    linear-gradient(#2c2c2c 0 0) 40px 25px/20px 12px no-repeat,
    linear-gradient(#2c2c2c 0 0) 25px 45px/20px 12px no-repeat;
}

/* === ENERGIA */
.circle{
  position:absolute;
  inset:14px;
  border-radius:50%;
  border:5px solid #2c2c2c;
}

/* === LINEA ENERGIA */
.energy-line{
  position:absolute;
  width:6px;
  height:140px;
  left:58%;
  top:250px;
  background:repeating-linear-gradient(
    180deg,
    #2c2c2c,
    #2c2c2c 6px,
    transparent 6px,
    transparent 12px
  );
}

/* POSIZIONI */
.depot{ top:150px; left:10%;}
.tracks{ top:130px; left:55%;}
.control{ top:160px; left:72%;}
.cargo{ top:240px; left:88%;}
.energy{ top:410px; left:55%;}

/* RAMI */
.branch-left{ width:120px; left:10%; top:250px;}
.branch-up{ height:80px; left:10%; top:170px;}
.branch-right{ width:140px; left:80%; top:250px;}
.branch-down{ height:140px; left:58%; top:250px;}

</style>
</head>

<body>

<div class="map">

<div class="line main"></div>

<div class="line branch branch-left"></div>
<div class="line vertical branch-up"></div>
<div class="line branch branch-right"></div>
<div class="line vertical branch-down"></div>

<!-- deposito -->
<div class="node depot">
  <div class="node-inner"></div>
</div>

<!-- treni -->
<div class="train t1"></div>
<div class="train t2"></div>

<!-- stazione -->
<div class="node station">
  <div class="station-inner">
    <div class="doors"></div>
  </div>
</div>

<!-- binari -->
<div class="node tracks">
  <div class="node-inner tracks-pattern"></div>
</div>

<!-- controllo -->
<div class="node control">
  <div class="node-inner control-pattern"></div>
</div>

<!-- merci -->
<div class="node cargo">
  <div class="node-inner cargo-pattern"></div>
</div>

<!-- energia -->
<div class="node energy">
  <div class="node-inner">
    <div class="circle"></div>
  </div>
</div>

<div class="energy-line"></div>

</div>

</body>
</html>
