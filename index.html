<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrenoScommesse</title>

<style>

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: -apple-system, system-ui;
  background: #f4f1ea;
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #0f2a44;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

.saldo {
  background: #d6a84c;
  padding: 6px 12px;
  border-radius: 10px;
  color: #000;
  font-weight: bold;
}

/* ===== PAGE ===== */
.page {
  padding: 70px 16px 100px;
}

/* ===== TRENI ===== */
.train-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.train-row {
  background: #e6dccb;
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 2px solid #d0c3ad;
  cursor: pointer;
  transition: 0.2s;
}

.train-row:active {
  transform: scale(0.97);
}

/* vagoni */
.train-body {
  display: flex;
  gap: 4px;
}

.wagon {
  width: 18px;
  height: 12px;
  background: #b5b5b5;
  border-radius: 3px;
}

/* muso treno */
.train-front {
  width: 40px;
  height: 20px;
  background: red;
  border-radius: 10px 4px 4px 10px;
}

/* testo */
.train-info {
  flex: 1;
  margin-left: 10px;
}

.train-name {
  font-weight: bold;
  font-size: 14px;
}

.train-route {
  font-size: 12px;
  opacity: 0.7;
}

/* ===== BARRA SOTTO ===== */
.bottom-bar {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #0f2a44;
  border-radius: 20px;
  padding: 10px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

/* bottoni */
.nav-btn {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 22px;
}

/* centrale */
.nav-center {
  width: 70px;
  height: 70px;
  background: #d6a84c;
  color: black;
  font-size: 26px;
  border-radius: 18px;
  transform: translateY(-20px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

/* ===== POPUP ===== */
.popup {
  position: fixed;
  bottom: 120px;
  left: 20px;
  right: 20px;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  display: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.popup h3 {
  margin-top: 0;
}

.close {
  position: absolute;
  right: 12px;
  top: 8px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🚆 TrenoScommesse</div>
  <div class="saldo">1000€</div>
</div>

<!-- PAGE -->
<div class="page">

  <h3>Scegli il treno</h3>

  <div class="train-list">

    <!-- TRENO 1 -->
    <div class="train-row" onclick="openPopup('Super Rosso')">
      <div class="train-body">
        <div class="wagon"></div>
        <div class="wagon"></div>
        <div class="wagon"></div>
      </div>
      <div class="train-info">
        <div class="train-name">Super Rosso</div>
        <div class="train-route">Roma → Milano</div>
      </div>
      <div class="train-front"></div>
    </div>

    <!-- TRENO 2 -->
    <div class="train-row" onclick="openPopup('Linea Inter')">
      <div class="train-body">
        <div class="wagon"></div>
        <div class="wagon"></div>
      </div>
      <div class="train-info">
        <div class="train-name">Linea Inter</div>
        <div class="train-route">Napoli → Torino</div>
      </div>
      <div class="train-front"></div>
    </div>

    <!-- TRENO 3 -->
    <div class="train-row" onclick="openPopup('Locale Base')">
      <div class="train-body">
        <div class="wagon"></div>
        <div class="wagon"></div>
      </div>
      <div class="train-info">
        <div class="train-name">Locale Base</div>
        <div class="train-route">Bari → Taranto</div>
      </div>
      <div class="train-front"></div>
    </div>

  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="close" onclick="closePopup()">✖</div>
  <h3 id="popup-title"></h3>
  <p>Scommetti sul ritardo</p>
</div>

<!-- BARRA SOTTO -->
<div class="bottom-bar">

  <div class="nav-btn">👤</div>

  <div class="nav-btn nav-center">🚆</div>

  <div class="nav-btn">🎯</div>

</div>

<script>

function openPopup(nome) {
  document.getElementById("popup-title").innerText = nome;
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
