<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>TrenoScommesse - Gestione Ferroviaria</title>
    <style>
        :root {
            --bg: #f5efe6;
            --navy: #0f2e47;
            --gold: #e8a820;
            --gold2: #f5c842;
            --red: #e03030;
            --blue: #2979c8;
            --teal: #1ab8a0;
            --orange: #e86820;
            --purple: #7c5cbf;
            --green: #28a060;
            --panel: #fff8f0;
            --border: #e0d4c0;
            --text: #1a1a1a;
            --muted: #7a6a5a;
            --shadow: 0 6px 24px rgba(0,0,0,0.10);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.16);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            position: sticky; top: 0; z-index: 200;
            background: var(--navy);
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.22);
        }
        .brand { font-size: 20px; font-weight: 800; color: #fff; }
        .brand span { color: var(--gold); }
        .balance-pill {
            background: var(--gold);
            color: #111;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
        }

        /* PAGES */
        .container { max-width: 520px; margin: 0 auto; padding: 20px 16px 110px; }
        .page { display: none; }
        .page.active { display: block; }

        .section-title { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
        .section-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

        /* METRO MAP */
        .metro-wrap {
            position: relative;
            background: #0a1c2e;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--shadow-lg);
            aspect-ratio: 1 / 0.72;
            width: 100%;
        }
        #metroCanvas { display: block; width: 100%; height: 100%; }

        /* UPGRADE GRID */
        .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .upg-card {
            background: var(--panel);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 16px 14px;
            position: relative;
            cursor: pointer;
        }
        .upg-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 20px 20px 0 0;
        }
        .upg-card.c-red::before { background: var(--red); }
        .upg-card.c-blue::before { background: var(--blue); }
        .upg-card.c-teal::before { background: var(--teal); }
        .upg-card.c-gold::before { background: var(--gold); }
        .upg-lbl { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .upg-val { font-size: 32px; font-weight: 800; color: var(--navy); }

        /* TRAIN CARDS & BETS */
        .train-cards { display: grid; gap: 14px; margin-bottom: 24px; }
        .t-card {
            border-radius: 24px; overflow: hidden; position: relative; min-height: 140px; cursor: pointer; color: #fff;
        }
        .t-bg { position: absolute; inset: 0; z-index: 0; }
        .t-av .t-bg { background: linear-gradient(135deg, #c0392b, #3d0808); }
        .t-ic .t-bg { background: linear-gradient(135deg, #1a5faa, #071f3c); }
        .t-re .t-bg { background: linear-gradient(135deg, #1e7a52, #051e12); }
        .t-il .t-bg { background: linear-gradient(135deg, #d4820a, #3a1f00); }
        .t-content { position: relative; z-index: 1; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; min-height: 140px;}

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--navy); padding: 10px 0 25px;
            display: flex; justify-content: space-around; z-index: 1000;
        }
        .nav-btn { color: rgba(255,255,255,0.5); text-align: center; cursor: pointer; font-size: 12px; }
        .nav-btn.active { color: #fff; }
        .nav-icon { 
            background: rgba(255,255,255,0.1); width: 45px; height: 45px; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 4px; font-weight: bold;
        }
        .nav-btn.active .nav-icon { background: var(--gold); color: #000; }

        /* Altri stili necessari per i popup */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 2000; backdrop-filter: blur(4px); }
        .popup { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff; 
            border-radius: 24px 24px 0 0; padding: 24px; display: none; z-index: 2100;
        }
        .popup.open { display: block; }
        .pop-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--navy); color: #fff; font-weight: 800; margin-top: 10px; cursor: pointer;}
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">Treno<span>Scommesse</span></div>
    <div class="balance-pill" id="balBox">1.000€</div>
</div>

<div class="container">
    <div id="pageStation" class="page active">
        <div class="section-title">La tua stazione</div>
        <div class="section-sub">Potenzia la rete per migliorare le scommesse.</div>
        <div class="metro-wrap">
            <canvas id="metroCanvas"></canvas>
        </div>
        <div class="upgrade-grid">
            <div class="upg-card c-red" onclick="openUpgrade('train')">
                <div class="upg-lbl">🚂 Deposito</div>
                <div class="upg-val" id="lvTrain">1</div>
            </div>
            <div class="upg-card c-blue" onclick="openUpgrade('station')">
                <div class="upg-lbl">🛤️ Binari</div>
                <div class="upg-val" id="lvStation">1</div>
            </div>
        </div>
    </div>

    <div id="pageBets" class="page">
        <div class="section-title">Scommesse</div>
        <div class="train-cards">
            <div class="t-card t-av" onclick="openBet(0)">
                <div class="t-bg"></div>
                <div class="t-content">
                    <b>AV - Alta Velocità</b>
                    <div>Roma → Milano</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-btn" onclick="showPage('profile')"><div class="nav-icon">PR</div>Profilo</div>
    <div class="nav-btn active" onclick="showPage('station')"><div class="nav-icon">ST</div>Stazione</div>
    <div class="nav-btn" onclick="showPage('bets')"><div class="nav-icon">SC</div>Scommesse</div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup">
    <h2 id="popTitle">Potenziamento</h2>
    <p id="popSub">Dettagli dell'upgrade</p>
    <button class="pop-btn" onclick="closePopup()">Chiudi</button>
</div>

<script>
    // STATO GIOCO
    let balance = 1000;
    let levels = { train: 1, station: 1, control: 1, logistics: 1 };

    // MAPPA CANVAS
    const canvas = document.getElementById('metroCanvas');
    const ctx = canvas.getContext('2d');
    const colors = { red: '#e03030', blue: '#2979c8', teal: '#1ab8a0', yellow: '#e8a820' };

    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        drawMetro(rect.width, rect.height);
    }

    function drawMetro(w, h) {
        ctx.clearRect(0, 0, w, h);
        
        // Disegno Linea Rossa
        ctx.beginPath();
        ctx.strokeStyle = colors.red;
        ctx.lineWidth = 6;
        ctx.moveTo(w * 0.1, h * 0.5);
        ctx.lineTo(w * 0.9, h * 0.5);
        ctx.stroke();

        // Disegno Linea Blu
        ctx.beginPath();
        ctx.strokeStyle = colors.blue;
        ctx.lineWidth = 6;
        ctx.moveTo(w * 0.3, h * 0.2);
        ctx.lineTo(w * 0.7, h * 0.8);
        ctx.stroke();

        // Stazioni
        drawStation(w * 0.5, h * 0.5, "Centrale", true);
        drawStation(w * 0.1, h * 0.5, "Deposito", false);
        drawStation(w * 0.9, h * 0.5, "Ovest", false);
    }

    function drawStation(x, y, label, main) {
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(x, y, main ? 10 : 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.fillStyle = "#fff";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(label, x, y + 25);
    }

    // GESTIONE PAGINE
    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById('page' + p.charAt(0).toUpperCase() + p.slice(1)).classList.add('active');
        if(p === 'station') setTimeout(initCanvas, 50);
    }

    function openUpgrade(key) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('popup').classList.add('open');
        document.getElementById('popTitle').innerText = "Potenzia " + key;
    }

    function closePopup() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('popup').classList.remove('open');
    }

    window.addEventListener('resize', initCanvas);
    window.onload = initCanvas;
</script>

</body>
</html>
