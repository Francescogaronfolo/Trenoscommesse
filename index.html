<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Mappa Ferroviaria</title>

<style>
body {
    margin: 0;
    background: #1c1f24;
    font-family: Arial;
}

.map-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

/* 🌍 Terreno */
.ground {
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(#4e7f3d, #3a5f2e);
}

/* 🛣️ Strade */
.road {
    position: absolute;
    width: 100%;
    height: 20px;
    background: #444;
    top: 60%;
}

/* 🌳 Alberi */
.tree {
    position: absolute;
    width: 20px;
    height: 20px;
    background: green;
    border-radius: 50%;
}

/* 🚉 Stazione */
.station {
    position: absolute;
    width: 200px;
    height: 120px;
    background: #dcdcdc;
    border-radius: 10px;
    top: 40%;
    left: 40%;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* 🛤️ Binari */
.track {
    position: absolute;
    width: 100%;
    height: 6px;
    background: #888;
}

.track::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 2px;
    background: #555;
    top: 2px;
}

/* 🚆 Treno */
.train {
    position: absolute;
    width: 60px;
    height: 12px;
    background: red;
    border-radius: 5px;
    top: 52%;
    left: 20%;
}

/* 🏭 Zona industriale */
.factory {
    position: absolute;
    width: 120px;
    height: 80px;
    background: #888;
    top: 30%;
    left: 70%;
}

/* ⚡ Energia */
.energy {
    position: absolute;
    width: 80px;
    height: 80px;
    background: #555;
    top: 50%;
    left: 75%;
}
</style>
</head>

<body>

<div class="map-container">

    <div class="ground"></div>

    <div class="road"></div>

    <!-- 🌳 alberi -->
    <div class="tree" style="top:20%; left:20%;"></div>
    <div class="tree" style="top:25%; left:25%;"></div>
    <div class="tree" style="top:30%; left:22%;"></div>

    <!-- 🚉 stazione -->
    <div class="station"></div>

    <!-- 🛤️ binari -->
    <div class="track" style="top:50%;"></div>
    <div class="track" style="top:55%;"></div>
    <div class="track" style="top:60%;"></div>

    <!-- 🚆 treno -->
    <div class="train"></div>

    <!-- 🏭 industria -->
    <div class="factory"></div>

    <!-- ⚡ energia -->
    <div class="energy"></div>

</div>

</body>
</html>
