<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrenoScommesse</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f2ede4;
}

/* BARRA SOPRA */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #0d2b45;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    box-sizing: border-box;
    z-index: 100;
}

.balance {
    background: #d4a93a;
    padding: 6px 12px;
    border-radius: 10px;
    font-weight: bold;
}

/* CONTENUTO */
.container {
    padding: 80px 15px 90px;
}

/* TRENI */
.train-bar {
    background: #d9d1c3;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.train-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.train {
    display: flex;
    align-items: center;
}

.engine {
    width: 55px;
    height: 26px;
    border-radius: 12px 20px 8px 8px;
    position: relative;
}

.engine::after {
    content: "";
    position: absolute;
    top: 6px;
    left: 10px;
    width: 20px;
    height: 10px;
    background: rgba(255,255,255,0.7);
    border-radius: 4px;
}

.red { background: linear-gradient(90deg, #c62828, #ef5350); }
.white { background: linear-gradient(90deg, #e0e0e0, #ffffff); }
.blue { background: linear-gradient(90deg, #1565c0, #42a5f5); }
.dark { background: linear-gradient(90deg, #424242, #757575); }

.car {
    width: 45px;
    height: 22px;
    background: #bdbdbd;
    margin-left: 6px;
    border-radius: 6px;
    position: relative;
}

.car::after {
    content: "";
    position: absolute;
    top: 5px;
    left: 6px;
    width: 30px;
    height: 8px;
    background: rgba(255,255,255,0.6);
    border-radius: 4px;
}

.train-right-indicator {
    width: 30px;
    height: 12px;
    background: red;
    border-radius: 6px;
}

/* BARRA SOTTO */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 70px;
    background: #0d2b45;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.nav-btn {
    color: white;
    text-align: center;
}

.center-btn {
    background: #d4a93a;
    padding: 12px;
    border-radius: 14px;
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    border-radius: 16px;
    width: 80%;
    max-width: 300px;
    display: none;
    z-index: 200;
}

.popup h3 {
    margin-top: 0;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
    display: none;
    z-index: 150;
}

button {
    padding: 10px;
    border: none;
    background: #0d2b45;
    color: white;
    border-radius: 8px;
    margin-top: 10px;
    width: 100%;
}

</style>
</head>

<body>

<div class="topbar">
    <div>🚆 TrenoScommesse</div>
    <div class="balance">1000€</div>
</div>

<div class="container">

<h2>Scegli il treno</h2>

<div class="train-bar" onclick="openPopup('Atria V-01')">
    <div class="train-left">
        <div class="train">
            <div class="engine red"></div>
            <div class="car"></div>
            <div class="car"></div>
        </div>
        <div>
            <strong>Atria V-01</strong><br>
            <small>Roma → Milano</small>
        </div>
    </div>
    <div class="train-right-indicator"></div>
</div>

<div class="train-bar" onclick="openPopup('Radian R-12')">
    <div class="train-left">
        <div class="train">
            <div class="engine white"></div>
            <div class="car"></div>
            <div class="car"></div>
        </div>
        <div>
            <strong>Radian R-12</strong><br>
            <small>Venezia → Roma</small>
        </div>
    </div>
    <div class="train-right-indicator"></div>
</div>

<div class="train-bar" onclick="openPopup('Intera N-07')">
    <div class="train-left">
        <div class="train">
            <div class="engine blue"></div>
            <div class="car"></div>
            <div class="car"></div>
        </div>
        <div>
            <strong>Intera N-07</strong><br>
            <small>Napoli → Torino</small>
        </div>
    </div>
    <div class="train-right-indicator"></div>
</div>

</div>

<div class="navbar">
    <div class="nav-btn">👤</div>
    <div class="nav-btn center-btn">🚉</div>
    <div class="nav-btn">🎯</div>
</div>

<div class="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
    <h3 id="trainName"></h3>
    <p>Inserisci puntata</p>
    <input type="number" placeholder="€" style="width:100%; padding:8px;">
    <button onclick="closePopup()">Conferma</button>
</div>

<script>

function openPopup(name) {
    document.getElementById("popup").style.display = "block";
    document.querySelector(".overlay").style.display = "block";
    document.getElementById("trainName").innerText = name;
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
    document.querySelector(".overlay").style.display = "none";
}

</script>

</body>
</html>
