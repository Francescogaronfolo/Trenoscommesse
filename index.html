<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrenoScommesse</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:#1e2a32;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  z-index:10;
}

.saldo{
  font-weight:bold;
}

/* CONTENT */
.page{
  display:none;
  padding:80px 15px 100px;
  height:100vh;
  overflow-y:auto;
}

.page.active{
  display:block;
}

/* BOTTOM BAR */
.bottombar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#ddd;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.btn{
  padding:10px;
  cursor:pointer;
}

/* TRENI */
.treno{
  background:white;
  margin:10px 0;
  padding:15px;
  border:1px solid #ccc;
  cursor:pointer;
}

/* POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border:2px solid black;
  display:none;
  z-index:20;
  width:80%;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:15;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>🚂 Treno</div>
  <div class="saldo" id="saldo">1000€</div>
</div>

<!-- PAGINE -->

<div id="stazione" class="page active">
  <h2>Stazione</h2>
  <div onclick="openUpgrade()">🚂 Il tuo treno (Livello <span id="lvl">1</span>)</div>
</div>

<div id="scommesse" class="page">
  <h2>Scommesse</h2>
  <div id="listaTreni"></div>
</div>

<div id="profilo" class="page">
  <h2>Profilo</h2>
  <p>Livello treno: <span id="lvl2">1</span></p>

  <h3>Classifica</h3>
  <div id="classifica"></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="btn" onclick="showPage('profilo')">👤</div>
  <div class="btn" onclick="showPage('stazione')">🚂</div>
  <div class="btn" onclick="showPage('scommesse')">🎲</div>
</div>

<!-- POPUP -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <div id="popupContent"></div>
  <button onclick="closePopup()">X</button>
</div>

<script>

let saldo = 1000;
let livello = 1;

const treni = [
"Frecciarossa",
"Intercity",
"Regionale",
"Freccia",
"Notte",
"Locale"
];

function updateUI(){
  document.getElementById("saldo").innerText = saldo + "€";
  document.getElementById("lvl").innerText = livello;
  document.getElementById("lvl2").innerText = livello;
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function renderTreni(){
  let html="";
  treni.forEach((t,i)=>{
    html+=`<div class="treno" onclick="scommetti(${i})">${t}</div>`;
  });
  document.getElementById("listaTreni").innerHTML=html;
}

function scommetti(i){
  openPopup(`
    <h3>${treni[i]}</h3>
    <button onclick="gioca()">Scommetti</button>
  `);
}

function gioca(){
  let win = Math.random() > 0.5;
  if(win){
    saldo += 100;
  } else {
    saldo -= 100;
  }
  closePopup();
  updateUI();
}

function openUpgrade(){
  let costo = livello * 200;
  openPopup(`
    <h3>Upgrade Treno</h3>
    <p>Livello: ${livello}</p>
    <p>Costo: ${costo}€</p>
    <button onclick="upgrade(${costo})">Migliora</button>
  `);
}

function upgrade(costo){
  if(saldo >= costo){
    saldo -= costo;
    livello++;
  }
  closePopup();
  updateUI();
}

function openPopup(html){
  document.getElementById("popupContent").innerHTML = html;
  document.getElementById("popup").style.display="block";
  document.getElementById("overlay").style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  document.getElementById("overlay").style.display="none";
}

function renderClassifica(){
  let lista = [
    {nome:"Roma", score:5000},
    {nome:"Napoli", score:4000},
    {nome:"Milano", score:3000},
    {nome:"Torino", score:2000},
    {nome:"Bari", score:1500},
    {nome:"Palermo", score:1200},
    {nome:"TU", score:livello*1000}
  ];

  lista.sort((a,b)=>b.score-a.score);

  let html="";
  lista.forEach(l=>{
    html+=`<div>${l.nome} - ${l.score}</div>`;
  });

  document.getElementById("classifica").innerHTML = html;
}

renderTreni();
renderClassifica();
updateUI();

</script>

</body>
</html>
